name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in what you can.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04"
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where are you running Claude?
      placeholder: "Cowork (browser) / Claude Desktop / terminal CLI"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect vs. what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran install.sh
        2. In Cowork said "..."
        3. Saw error ...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Output of: tail -20 ~/.cowork-to-code-bridge/daemon.err"
      render: shell

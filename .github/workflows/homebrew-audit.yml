name: Homebrew audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packaging/homebrew/**"
      - ".github/workflows/homebrew-audit.yml"
  pull_request:
    paths:
      - "packaging/homebrew/**"
      - ".github/workflows/homebrew-audit.yml"

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage formula in a temporary tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/local/homebrew-tap/Formula"
          mkdir -p "$tap_dir"
          cp packaging/homebrew/cowork-to-code-bridge.rb "$tap_dir/"

      - name: Audit formula
        run: brew audit --strict local/tap/cowork-to-code-bridge

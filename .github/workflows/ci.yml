name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The bridge runs on macOS (launchd) and Linux (systemd); test on both.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n daemon/uninstall.sh
          bash -n scripts/lib/platform.sh
          bash -n scripts/ci-wsl-smoke.sh
          bash -n tests/test_platform_detection.sh
          for s in examples/allowed_scripts/*.sh; do bash -n "$s"; done
          bash -n tests/test_reverse_inbox.sh

      - name: Reverse-inbox test
        run: bash tests/test_reverse_inbox.sh

      - name: Platform detection tests
        if: runner.os == 'Linux'
        run: bash tests/test_platform_detection.sh

      - name: Tests
        run: pytest -q

  wsl-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # GHA windows runners enable WSL but ship NO Linux distro by default.
      # wsl.exe wslpath then prints "no installed distributions" to stdout (not a path).
      # See: https://github.com/actions/runner-images/issues/12646
      - name: Install WSL Ubuntu
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-22.04
          set-as-default: true

      - name: WSL syntax check and environment
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $winPath = "$env:GITHUB_WORKSPACE".Replace('\', '/')
          # Default distro (setup-wsl set-as-default); do not hardcode Ubuntu-22.04 vs Ubuntu.
          $repo = (wsl.exe wslpath -a $winPath).Trim()
          if ($repo -notmatch '^/') { throw "wslpath failed (no WSL distro?): $repo" }
          Write-Host "WSL repo path: $repo"
          wsl.exe -e bash -lc "export GITHUB_WORKSPACE='$winPath'; bash '$repo/scripts/ci-wsl-smoke.sh'"
